name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - deploy/v2-live
  workflow_dispatch:

permissions:
  contents: write

# Avoid running duplicate deploys for the same commit SHA
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node 🔧
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install and Build 📦
        run: |
          npm ci
          npm run build

      - name: Remove stale CNAME (if present) 🧹
        run: rm -f dist/CNAME

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          single-commit: true