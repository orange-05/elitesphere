name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - deploy/v2-live
  workflow_dispatch:

permissions:
  contents: write

# Avoid running duplicate deploys for the same commit SHA
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node 🔧
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install and Build 📦
        run: |
          npm ci
          npm run build

      # The site is currently served from the `master` branch root
      # (GitHub Pages is configured for master, not gh-pages).
      # We push `dist/` directly to master root. Source files
      # (src/, package.json, etc.) are preserved via the
      # `keep_files: true` flag below.
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: master
          clean: false
          keep_files: true
          single-commit: true
          git_config_name: "github-actions[bot]"
          git_config_email: "github-actions[bot]@users.noreply.github.com"